name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_IMAGE: 990151165442.dkr.ecr.us-east-1.amazonaws.com/prosperas-app
  CLOUDFRONT_DIST_ID: E1XFRPD5RHC3NR
  CLOUDFRONT_URL: https://d2v3qmq1azg45r.cloudfront.net
  S3_FRONTEND_BUCKET: prosperas-frontend

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          cd backend
          ruff check app/

      - name: Run tests with coverage
        env:
          SECRET_KEY: "ci-test-secret-key-not-used-in-production"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_DEFAULT_REGION: "us-east-1"
          SQS_QUEUE_URL: "http://localhost:4566/000000000000/prosperas-jobs"
          SQS_DLQ_URL: "http://localhost:4566/000000000000/prosperas-jobs-dlq"
          S3_BUCKET_NAME: "prosperas-reports"
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=90

  build-and-deploy-backend:
    name: Build backend + deploy to EC2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push unified app image
        run: |
          docker build -t $ECR_IMAGE:latest -t $ECR_IMAGE:${{ github.sha }} ./backend
          docker push $ECR_IMAGE:latest
          docker push $ECR_IMAGE:${{ github.sha }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin 990151165442.dkr.ecr.us-east-1.amazonaws.com

            mkdir -p /home/ec2-user/app
            cat > /home/ec2-user/app/docker-compose.yml << 'COMPOSE'
            services:
              backend:
                image: 990151165442.dkr.ecr.us-east-1.amazonaws.com/prosperas-app:latest
                ports:
                  - "8000:8000"
                env_file: /home/ec2-user/app/.env
                restart: unless-stopped

              worker:
                image: 990151165442.dkr.ecr.us-east-1.amazonaws.com/prosperas-app:latest
                command: python -m app.worker.main
                env_file: /home/ec2-user/app/.env
                restart: unless-stopped
            COMPOSE

            cd /home/ec2-user/app
            docker compose pull
            docker compose up -d --remove-orphans
            sleep 10
            curl -f http://localhost:8000/health || exit 1
            echo "Backend deploy OK"

  build-and-deploy-frontend:
    name: Build frontend + deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        env:
          VITE_API_URL: ${{ env.CLOUDFRONT_URL }}
        run: |
          cd frontend
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist s3://$S3_FRONTEND_BUCKET --delete \
            --cache-control "max-age=31536000"
          aws s3 cp frontend/dist/index.html s3://$S3_FRONTEND_BUCKET/index.html \
            --cache-control "no-cache, no-store"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DIST_ID \
            --paths "/*"
          echo "Frontend deploy OK — $CLOUDFRONT_URL"

  smoke-test:
    name: Smoke test production URLs
    runs-on: ubuntu-latest
    needs: [build-and-deploy-backend, build-and-deploy-frontend]
    steps:
      - name: Test backend health
        run: |
          curl -f http://${{ secrets.EC2_HOST }}:8000/health
          echo "Backend OK"

      - name: Test CloudFront frontend
        run: |
          sleep 30
          curl -f -L ${{ env.CLOUDFRONT_URL }}
          echo "Frontend OK"
